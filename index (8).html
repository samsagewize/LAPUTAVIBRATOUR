<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Puta Vibra Tour — CDMX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #f0ece0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── ANIMATED BG ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* slow rotating gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift linear infinite;
    }
    .orb1 { width: 600px; height: 600px; background: #ffffff; top: -100px; left: -150px; animation-duration: 18s; }
    .orb2 { width: 500px; height: 500px; background: #aaaaaa; bottom: -80px; right: -100px; animation-duration: 22s; animation-direction: reverse; }
    .orb3 { width: 300px; height: 300px; background: #cccccc; top: 40%; left: 50%; animation-duration: 14s; opacity: 0.08; }

    @keyframes drift {
      0%   { transform: translate(0, 0) rotate(0deg); }
      33%  { transform: translate(60px, -40px) rotate(120deg); }
      66%  { transform: translate(-40px, 50px) rotate(240deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }

    /* particle stars */
    .stars {
      position: absolute;
      inset: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(1); }
      50%       { opacity: 1; transform: scale(1.8); }
    }

    /* scan lines */
    .scan {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    /* ── FLOATING BRAND ELEMENTS ── */
    .floater {
      position: fixed;
      pointer-events: none;
      z-index: 3;
      opacity: 0.55;
      will-change: transform;
    }

    /* sticker sheet — scattered around edges */
    .f-sticker-tl {
      top: -30px; left: -30px;
      width: 320px;
      animation: floatA 9s ease-in-out infinite;
      opacity: 0.35;
    }
    .f-sticker-br {
      bottom: -40px; right: -20px;
      width: 280px;
      animation: floatB 11s ease-in-out infinite;
      opacity: 0.3;
      transform: rotate(180deg);
    }
    .f-sticker-tr {
      top: 20px; right: -20px;
      width: 200px;
      animation: floatC 13s ease-in-out infinite;
      opacity: 0.25;
      transform: rotate(90deg);
    }
    .f-sticker-bl {
      bottom: 10px; left: -10px;
      width: 220px;
      animation: floatA 15s ease-in-out infinite reverse;
      opacity: 0.2;
      transform: rotate(-90deg);
    }

    /* LPV logo floating top center */
    .f-lpv {
      top: 1.5rem; left: 50%;
      transform: translateX(-50%);
      width: 140px;
      animation: floatB 8s ease-in-out infinite;
      opacity: 0.6;
      pointer-events: none;
    }

    @keyframes floatA {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(-18px) rotate(3deg); }
    }
    @keyframes floatB {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(14px) rotate(-2deg); }
    }
    @keyframes floatC {
      0%, 100% { transform: translateY(0px) rotate(90deg); }
      50%       { transform: translateY(-20px) rotate(93deg); }
    }

    /* ── MAIN CONTENT ── */
    .wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      gap: 0;
    }

    /* main logo image */
    .main-logo {
      width: min(680px, 90vw);
      margin-bottom: 2rem;
      animation: logoIn 1s ease both;
      filter: drop-shadow(0 0 40px rgba(255,255,255,0.15));
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .date-block {
      animation: up 0.9s 0.3s ease both;
    }

    .date-line {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.12em;
      color: #f0ece0;
    }

    .city-line {
      font-size: 0.65rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-top: 0.3rem;
    }

    /* divider */
    .div-line {
      width: 60px;
      height: 1px;
      background: rgba(240,236,224,0.2);
      margin: 2rem auto;
      animation: up 0.9s 0.4s ease both;
    }

    /* TICKET BUTTON */
    .ticket-btn {
      display: inline-block;
      padding: 1.15em 3.2em;
      background: #f0ece0;
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid #f0ece0;
      transition: background 0.25s, color 0.25s, box-shadow 0.25s, transform 0.15s;
      animation: up 0.9s 0.5s ease both;
      position: relative;
    }

    .ticket-btn:hover {
      background: transparent;
      color: #f0ece0;
      box-shadow: 0 0 50px rgba(255,255,255,0.25), 0 0 100px rgba(255,255,255,0.08);
      transform: scale(1.03);
    }

    .ticket-btn:active { transform: scale(0.98); }

    .btn-sub {
      margin-top: 0.9rem;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.25;
      animation: up 1s 0.6s ease both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="stars" id="stars"></div>
  </div>
  <div class="scan"></div>

  <!-- FLOATING BRAND ASSETS -->
  <img class="floater f-sticker-tl" src="sticker2-lpv.png" alt="" />
  <img class="floater f-sticker-br" src="sticker2-lpv.png" alt="" />
  <img class="floater f-sticker-tr" src="sticker2-lpv.png" alt="" />
  <img class="floater f-sticker-bl" src="sticker2-lpv.png" alt="" />
  <img class="floater f-lpv" src="LPV-lpv.png" alt="LPV" />

  <!-- MAIN -->
  <div class="wrap">
    <img class="main-logo" src="flyerlogonewstar.png" alt="La Puta Vibra Tour" />

    <div class="date-block">
      <div class="date-line">27 de Junio 2026</div>
      <div class="city-line">Ciudad de México</div>
    </div>

    <div class="div-line"></div>

    <a
      href="https://www.passline.com/eventos/la-pta-vibra-tour-cdmx"
      target="_blank"
      rel="noopener"
      class="ticket-btn"
    >🎟 Compra tus boletos aquí</a>

    <div class="btn-sub">passline.com</div>
  </div>

  <script>
    // generate random twinkling stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top  = Math.random() * 100 + '%';
      s.style.animationDuration  = (2 + Math.random() * 4) + 's';
      s.style.animationDelay     = (Math.random() * 5) + 's';
      s.style.width  = (1 + Math.random() * 2) + 'px';
      s.style.height = s.style.width;
      container.appendChild(s);
    }

    // subtle parallax on mouse move
    document.addEventListener('mousemove', e => {
      const cx = (e.clientX / window.innerWidth  - 0.5) * 2;
      const cy = (e.clientY / window.innerHeight - 0.5) * 2;
      document.querySelectorAll('.floater').forEach((el, i) => {
        const d = (i + 1) * 6;
        el.style.transform = `translate(${cx * d}px, ${cy * d}px)`;
      });
      // override rotation for the rotated ones via data
      document.querySelector('.f-sticker-tr').style.transform = `rotate(90deg) translate(${cx*8}px, ${cy*8}px)`;
      document.querySelector('.f-sticker-bl').style.transform = `rotate(-90deg) translate(${cx*10}px, ${cy*10}px)`;
      document.querySelector('.f-sticker-br').style.transform = `rotate(180deg) translate(${cx*7}px, ${cy*7}px)`;
    });
  </script>
</body>
</html>
