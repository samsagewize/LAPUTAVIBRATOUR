<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Puta Vibra Tour — CDMX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #050505;
      --white: #f0ece0;
      --neon: #e8ff00;
      --magenta: #ff0066;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 60% 40%, rgba(232,255,0,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 70%, rgba(255,0,102,0.07) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .scan {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 2rem;
      animation: up 0.7s ease both;
    }

    h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(5rem, 20vw, 16rem);
      line-height: 0.87;
      letter-spacing: 0.01em;
      animation: up 0.8s 0.1s ease both;
    }

    h1 .outline {
      -webkit-text-stroke: 2px var(--neon);
      color: transparent;
      display: block;
      animation: glitch 5s 2s infinite;
    }

    .date-block {
      margin-top: 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      animation: up 0.9s 0.25s ease both;
    }

    .date-line {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: 0.1em;
    }

    .venue-line {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    .divider {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, transparent, rgba(240,236,224,0.15), transparent);
      margin: 2.5rem 0 0;
      animation: up 1s 0.35s ease both;
    }

    .ticket-btn {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 1.1em 3em;
      background: var(--neon);
      color: var(--black);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid var(--neon);
      transition: all 0.2s ease;
      animation: up 0.9s 0.45s ease both;
    }

    .ticket-btn:hover {
      background: transparent;
      color: var(--neon);
      box-shadow: 0 0 40px rgba(232,255,0,0.35), 0 0 80px rgba(232,255,0,0.1);
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes glitch {
      0%, 94%, 100% { transform: none; -webkit-text-stroke-color: var(--neon); }
      95% { transform: skewX(12deg); -webkit-text-stroke-color: var(--magenta); }
      97% { transform: skewX(-8deg); clip-path: inset(30% 0 40% 0); }
      98% { transform: none; clip-path: none; -webkit-text-stroke-color: var(--neon); }
    }
  </style>
</head>
<body>
  <div class="scan"></div>
  <div class="wrap">
    <p class="eyebrow">// DJ La Moon Presenta</p>
    <h1>
      La Puta<br>
      <span class="outline">Vibra</span>
      Tour
    </h1>
    <div class="date-block">
      <div class="date-line">27 de Junio 2026</div>
      <div class="venue-line">Ciudad de México</div>
    </div>
    <div class="divider"></div>
    <a
      href="https://www.passline.com/eventos/la-pta-vibra-tour-cdmx"
      target="_blank"
      rel="noopener"
      class="ticket-btn"
    >🎟 Get Tickets</a>
  </div>
</body>
</html>
